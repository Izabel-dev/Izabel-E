<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - FireLeaf</title>


  <!-- CSS externo -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">

  <!-- JS externo -->
  <script src="{{ url_for('static', filename='js/cadastro.js') }}" defer></script>
</head>

<body>

  <div class="logo">
    <img src="{{ url_for('static', filename='img/bodivermei.png') }}" width="50px" height=50px alt="Logo FireLeaf">
  </div>
  <main>
    <h1>Cadastro</h1>

    <form id="cadastroForm">
      <fieldset>
        <legend>Informações Pessoais</legend>

        <label for="nome">Nome *</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>

        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="Digite seu email" required>

        <label for="senha">Senha *</label>
        <input type="password" id="senha" placeholder="Crie uma senha" required>

        <label for="confirmar">Confirmar senha *</label>
        <input type="password" id="confirmar" placeholder="Repita a senha" required>

        <button type="submit">Cadastrar</button>
      </fieldset>
    </form>

    <br>
    <a href="{{ url_for('login') }}">Voltar para Login</a>
  </main>

</body>

</html>
